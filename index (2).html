<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leopard's Courier service Tracking Hub</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#0f1117;
color:white;
}

.header{
background:#151923;
padding:18px;
text-align:center;
border-bottom:1px solid #242a38;
}

.logo{
color:#f7c948;
font-size:24px;
font-weight:bold;
}

.nav{
background:#1a1f2b;
padding:12px;
text-align:center;
}

.nav span{
margin:0 12px;
color:#f7c948;
font-weight:bold;
cursor:pointer;
}

.container{
max-width:450px;
margin:30px auto;
padding:15px;
}

.box{
background:#171c26;
padding:25px;
border-radius:12px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:8px;
margin-bottom:12px;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#f7c948;
font-weight:bold;
cursor:pointer;
}

.card{
background:#222838;
padding:15px;
border-radius:10px;
line-height:1.8;
margin-top:15px;
}

.timeline{
margin-top:15px;
}

.step{
background:#222838;
margin-top:8px;
padding:10px;
border-radius:8px;
}

.active{
background:#f7c948;
color:black;
font-weight:bold;
}

.footer{
text-align:center;
color:#aaa;
margin-top:30px;
padding:20px;
}

#infoBox{
display:none;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">Leopards courier service Tracking Hub</div>
</div>

<div class="nav">
<span onclick="showTracking()">Tracking</span>
<span onclick="showServices()">Services</span>
<span onclick="showSupport()">Support</span>
</div>

<div class="container">

<div class="box">

<input type="text" id="trackInput" placeholder="Enter Tracking ID">

<button onclick="track()">Track Shipment</button>

<div id="infoBox" class="card"></div>

<div id="result"></div>

</div>

</div>

<div class="footer">
Karachi | Lahore | Islamabad | Peshawar | Quetta
<br><br>
<span style="color:#f7c948;font-weight:bold;">
Express Tracking Hub
</span>
</div>

<script>

function showTracking(){
document.getElementById("infoBox").style.display="none";
}

function showServices(){
let box=document.getElementById("infoBox");
box.style.display="block";
box.innerHTML=`
<h3>Services</h3>
✓ Express Delivery<br>
✓ Nationwide Shipping<br>
✓ Tracking Updates<br>
✓ Business Delivery Solutions
`;
}

function showSupport(){
let box=document.getElementById("infoBox");
box.style.display="block";
box.innerHTML=`
<h3>Support</h3>
UAN: 111 300 786
`;
}

function track(){

let input=document.getElementById("trackInput").value.trim();
let result=document.getElementById("result");

if(input==="KI0605813169"){

result.innerHTML=`
<div class="card">
<b>Tracking ID:</b> KI0605813169<br>
<b>Status:</b> Dispatched from Karachi — It's on the way 🚚<br>
<b>Destination:</b> Lahore<br>
<b>Current Location:</b> movement 
</div>

<div class="timeline">
<div class="step active">✓ Shipment Accepted</div>
<div class="step active">✓ Dispatched from Karachi</div>
<div class="step active">❌ In Transit</div>
<div class="step">Destination: Lahore</div>
</div>
`;

}else{

result.innerHTML=`
<div class="card">
Tracking ID not found
</div>
`;
}
}
</script>

</body>
</html>
